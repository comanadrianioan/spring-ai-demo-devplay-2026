<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 720" font-family="Inter, -apple-system, system-ui, sans-serif">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="grad-agent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <!-- Big arrow markers -->
    <marker id="big-arr" markerWidth="20" markerHeight="16" refX="19" refY="8" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L20,8 L0,16 Z" fill="#475569"/>
    </marker>
    <marker id="big-arr-start" markerWidth="20" markerHeight="16" refX="1" refY="8" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M20,0 L0,8 L20,16 Z" fill="#475569"/>
    </marker>
    <marker id="big-arr-blue" markerWidth="20" markerHeight="16" refX="19" refY="8" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L20,8 L0,16 Z" fill="#2563eb"/>
    </marker>
    <marker id="big-arr-blue-start" markerWidth="20" markerHeight="16" refX="1" refY="8" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M20,0 L0,8 L20,16 Z" fill="#2563eb"/>
    </marker>
    <marker id="big-arr-green" markerWidth="20" markerHeight="16" refX="19" refY="8" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L20,8 L0,16 Z" fill="#16a34a"/>
    </marker>
    <marker id="big-arr-green-start" markerWidth="20" markerHeight="16" refX="1" refY="8" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M20,0 L0,8 L20,16 Z" fill="#16a34a"/>
    </marker>
    <marker id="big-arr-pink" markerWidth="20" markerHeight="16" refX="19" refY="8" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L20,8 L0,16 Z" fill="#db2777"/>
    </marker>
    <marker id="big-arr-pink-start" markerWidth="20" markerHeight="16" refX="1" refY="8" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M20,0 L0,8 L20,16 Z" fill="#db2777"/>
    </marker>
    <marker id="big-arr-cyan" markerWidth="20" markerHeight="16" refX="19" refY="8" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L20,8 L0,16 Z" fill="#0891b2"/>
    </marker>
    <!-- MCP-styled marker (purple) -->
    <marker id="big-arr-mcp" markerWidth="20" markerHeight="16" refX="19" refY="8" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L20,8 L0,16 Z" fill="#7c3aed"/>
    </marker>
  </defs>

  <!-- ══════════════ TEAMS ══════════════ -->
  <g filter="url(#shadow)">
    <rect x="30" y="320" width="200" height="120" rx="14" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2.5"/>
  </g>
  <text x="130" y="365" text-anchor="middle" font-size="20" font-weight="700" fill="#4c1d95">Microsoft Teams</text>
  <text x="130" y="390" text-anchor="middle" font-size="14" fill="#7c3aed">User question</text>
  <rect x="50" y="402" width="160" height="30" rx="6" fill="#fff" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="130" y="422" text-anchor="middle" font-size="12" fill="#475569" font-style="italic">"rewards in feature X?"</text>

  <!-- ══════════════ Teams ↔ Gateway (big arrow) ══════════════ -->
  <path d="M230,380 L300,380" stroke="#475569" stroke-width="4" fill="none" marker-start="url(#big-arr-start)" marker-end="url(#big-arr)" stroke-linecap="round"/>

  <!-- ══════════════ GATEWAY ══════════════ -->
  <g filter="url(#shadow)">
    <rect x="300" y="340" width="120" height="80" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="2.5"/>
  </g>
  <polygon points="360,357 388,372 388,388 360,403 332,388 332,372" fill="none" stroke="#ea580c" stroke-width="2.5"/>
  <text x="360" y="384" text-anchor="middle" font-size="13" font-weight="700" fill="#9a3412">API</text>
  <text x="360" y="438" text-anchor="middle" font-size="16" font-weight="700" fill="#9a3412">Gateway</text>

  <!-- ══════════════ Gateway ↔ Orchestrator (big arrow) ══════════════ -->
  <path d="M420,380 L490,380" stroke="#475569" stroke-width="4" fill="none" marker-start="url(#big-arr-start)" marker-end="url(#big-arr)" stroke-linecap="round"/>

  <!-- ══════════════ ORCHESTRATOR AGENT ══════════════ -->
  <g filter="url(#shadow)">
    <rect x="490" y="310" width="240" height="140" rx="16" fill="url(#grad-agent)" stroke="#1e3a8a" stroke-width="2.5"/>
  </g>
  <circle cx="538" cy="375" r="26" fill="rgba(255,255,255,0.18)"/>
  <text x="538" y="385" text-anchor="middle" font-size="22" font-weight="800" fill="#fff">A</text>
  <text x="645" y="368" text-anchor="middle" font-size="20" font-weight="700" fill="#fff">Orchestrator</text>
  <text x="645" y="392" text-anchor="middle" font-size="20" font-weight="700" fill="#fff">Agent</text>
  <text x="610" y="430" text-anchor="middle" font-size="12" fill="#dbeafe">plans · decides · synthesizes</text>

  <!-- ══════════════ LLM (above orchestrator) ══════════════ -->
  <g filter="url(#shadow)">
    <rect x="530" y="80" width="160" height="100" rx="14" fill="#f0fdfa" stroke="#0d9488" stroke-width="2.5"/>
  </g>
  <text x="610" y="120" text-anchor="middle" font-size="22" font-weight="700" fill="#134e4a">LLM</text>
  <text x="610" y="148" text-anchor="middle" font-size="14" fill="#0f766e">Chat GPT</text>
  <text x="610" y="167" text-anchor="middle" font-size="12" fill="#94a3b8">reasoning core</text>

  <!-- Orchestrator ↔ LLM (vertical, big bidirectional) -->
  <path d="M610,310 L610,180" stroke="#2563eb" stroke-width="4" fill="none" marker-start="url(#big-arr-blue-start)" marker-end="url(#big-arr-blue)" stroke-linecap="round"/>
  <text x="625" y="250" font-size="13" fill="#2563eb" font-style="italic">reason</text>

  <!-- ══════════════ MCP SERVERS CONTAINER (dashed purple) ══════════════ -->
  <g>
    <rect x="860" y="120" width="525" height="510" rx="20" fill="rgba(124, 58, 237, 0.03)" stroke="#7c3aed" stroke-width="2.5" stroke-dasharray="10 6"/>
    <!-- Header tab -->
    <rect x="1000" y="106" width="280" height="32" rx="8" fill="#fff" stroke="#7c3aed" stroke-width="2"/>
    <text x="1140" y="128" text-anchor="middle" font-size="15" font-weight="800" fill="#7c3aed" letter-spacing="0.08em">MCP SERVERS</text>
  </g>

  <!-- ══════════════ RAG SERVICE (MCP server) ══════════════ -->
  <g filter="url(#shadow)">
    <rect x="900" y="160" width="220" height="100" rx="14" fill="#fff" stroke="#16a34a" stroke-width="2.5"/>
  </g>
  <rect x="900" y="160" width="8" height="100" fill="#16a34a" rx="3"/>
  <text x="1015" y="194" text-anchor="middle" font-size="18" font-weight="700" fill="#14532d">RAG search</text>
  <text x="1015" y="220" text-anchor="middle" font-size="12" fill="#475569">Vector search over</text>
  <text x="1015" y="238" text-anchor="middle" font-size="12" fill="#475569">knowledge base docs</text>

  <!-- ══════════════ CHAT HISTORY SERVICE (MCP server) ══════════════ -->
  <g filter="url(#shadow)">
    <rect x="900" y="330" width="220" height="100" rx="14" fill="#fff" stroke="#db2777" stroke-width="2.5"/>
  </g>
  <rect x="900" y="330" width="8" height="100" fill="#db2777" rx="3"/>
  <text x="1015" y="364" text-anchor="middle" font-size="18" font-weight="700" fill="#9d174d">Chat history</text>
  <text x="1015" y="390" text-anchor="middle" font-size="12" fill="#475569">Semantic cache of past</text>
  <text x="1015" y="408" text-anchor="middle" font-size="12" fill="#475569">question + answer pairs</text>

  <!-- ══════════════ WEB SEARCH SERVICE (MCP server) ══════════════ -->
  <g filter="url(#shadow)">
    <rect x="900" y="500" width="220" height="100" rx="14" fill="#fff" stroke="#0891b2" stroke-width="2.5"/>
  </g>
  <rect x="900" y="500" width="8" height="100" fill="#0891b2" rx="3"/>
  <text x="1015" y="534" text-anchor="middle" font-size="18" font-weight="700" fill="#155e75">Web search</text>
  <text x="1015" y="560" text-anchor="middle" font-size="12" fill="#475569">Fallback for unindexed</text>
  <text x="1015" y="578" text-anchor="middle" font-size="12" fill="#475569">or fresh information</text>

  <!-- ══════════════ ORCHESTRATOR → TOOL SERVICES (MCP — dashed purple) ══════════════ -->

  <!-- Orchestrator → RAG service (L-shape, dashed MCP) -->
  <path d="M730,340 L820,340 L820,210 L900,210" stroke="#7c3aed" stroke-width="3.2" fill="none" stroke-dasharray="9 5" marker-end="url(#big-arr-mcp)" stroke-linecap="round"/>
  <text x="780" y="333" font-size="13" font-weight="700" fill="#7c3aed" letter-spacing="0.05em">MCP</text>

  <!-- Orchestrator → Chat history service (straight horizontal, dashed MCP) -->
  <path d="M730,380 L900,380" stroke="#7c3aed" stroke-width="3.2" fill="none" stroke-dasharray="9 5" marker-end="url(#big-arr-mcp)" stroke-linecap="round"/>
  <text x="815" y="372" text-anchor="middle" font-size="13" font-weight="700" fill="#7c3aed" letter-spacing="0.05em">MCP</text>

  <!-- Orchestrator → Web search service (L-shape, dashed MCP) -->
  <path d="M730,420 L820,420 L820,550 L900,550" stroke="#7c3aed" stroke-width="3.2" fill="none" stroke-dasharray="9 5" marker-end="url(#big-arr-mcp)" stroke-linecap="round"/>
  <text x="780" y="440" font-size="13" font-weight="700" fill="#7c3aed" letter-spacing="0.05em">MCP</text>

  <!-- ══════════════ WIKI VECTOR DB (visual center at y=210) ══════════════ -->
  <g filter="url(#shadow)">
    <path d="M 1220,175 L 1220,245 A 70,18 0 0 0 1360,245 L 1360,175" fill="#f0fdf4" stroke="#16a34a" stroke-width="2.5"/>
    <ellipse cx="1290" cy="175" rx="70" ry="18" fill="#f0fdf4" stroke="#16a34a" stroke-width="2.5"/>
  </g>
  <text x="1290" y="215" text-anchor="middle" font-size="15" font-weight="700" fill="#14532d">Wiki</text>
  <text x="1290" y="238" text-anchor="middle" font-size="15" font-weight="700" fill="#14532d">Vector DB</text>

  <!-- RAG service → Wiki Vec DB (to cylinder visual center y=210) -->
  <path d="M1120,210 L1220,210" stroke="#16a34a" stroke-width="3.2" fill="none" marker-start="url(#big-arr-green-start)" marker-end="url(#big-arr-green)" stroke-linecap="round"/>

  <!-- ══════════════ CHAT HISTORY DB (visual center at y=380) ══════════════ -->
  <g filter="url(#shadow)">
    <path d="M 1220,345 L 1220,415 A 70,18 0 0 0 1360,415 L 1360,345" fill="#fdf2f8" stroke="#db2777" stroke-width="2.5"/>
    <ellipse cx="1290" cy="345" rx="70" ry="18" fill="#fdf2f8" stroke="#db2777" stroke-width="2.5"/>
  </g>
  <text x="1290" y="385" text-anchor="middle" font-size="15" font-weight="700" fill="#9d174d">Chat History</text>
  <text x="1290" y="408" text-anchor="middle" font-size="15" font-weight="700" fill="#9d174d">Vector DB</text>

  <!-- Chat history service → Chat History DB (to cylinder visual center y=380) -->
  <path d="M1120,380 L1220,380" stroke="#db2777" stroke-width="3.2" fill="none" marker-start="url(#big-arr-pink-start)" marker-end="url(#big-arr-pink)" stroke-linecap="round"/>

  <!-- ══════════════ WEB API (visual center at y=550) ══════════════ -->
  <g filter="url(#shadow)">
    <rect x="1220" y="500" width="160" height="100" rx="14" fill="#ecfeff" stroke="#0891b2" stroke-width="2.5"/>
  </g>
  <text x="1300" y="540" text-anchor="middle" font-size="18" font-weight="700" fill="#155e75">Web API</text>
  <text x="1300" y="568" text-anchor="middle" font-size="13" fill="#0e7490">Google / Bing</text>
  <text x="1300" y="586" text-anchor="middle" font-size="11" fill="#94a3b8">external</text>

  <!-- Web search service → Web API -->
  <path d="M1120,550 L1220,550" stroke="#0891b2" stroke-width="3.2" fill="none" marker-end="url(#big-arr-cyan)" stroke-linecap="round"/>
</svg>
