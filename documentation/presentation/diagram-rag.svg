<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 500" font-family="Inter, -apple-system, system-ui, sans-serif">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="grad-purple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="grad-green" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="grad-blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="grad-teal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <marker id="big-arr" markerWidth="20" markerHeight="16" refX="19" refY="8" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L20,8 L0,16 Z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- ══════════════ STEP 1: QUERY ══════════════ -->
  <g filter="url(#shadow)">
    <rect x="40" y="60" width="300" height="380" rx="18" fill="#faf5ff" stroke="#7c3aed" stroke-width="2.5"/>
  </g>
  <circle cx="190" cy="170" r="60" fill="url(#grad-purple)"/>
  <text x="190" y="190" text-anchor="middle" font-size="52" font-weight="800" fill="#fff">1</text>
  <text x="190" y="295" text-anchor="middle" font-size="30" font-weight="800" fill="#4c1d95">Query</text>
  <text x="190" y="345" text-anchor="middle" font-size="17" fill="#6d28d9">User asks a</text>
  <text x="190" y="370" text-anchor="middle" font-size="17" fill="#6d28d9">question</text>

  <!-- Arrow 1 → 2 -->
  <path d="M350,250 L400,250" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#big-arr)" stroke-linecap="round"/>
  <text x="375" y="235" text-anchor="middle" font-size="13" font-style="italic" fill="#94a3b8">question</text>

  <!-- ══════════════ STEP 2: RETRIEVE ══════════════ -->
  <g filter="url(#shadow)">
    <rect x="410" y="60" width="300" height="380" rx="18" fill="#f0fdf4" stroke="#16a34a" stroke-width="2.5"/>
  </g>
  <circle cx="560" cy="170" r="60" fill="url(#grad-green)"/>
  <text x="560" y="190" text-anchor="middle" font-size="52" font-weight="800" fill="#fff">2</text>
  <text x="560" y="295" text-anchor="middle" font-size="30" font-weight="800" fill="#14532d">Retrieve</text>
  <text x="560" y="345" text-anchor="middle" font-size="17" fill="#15803d">Find relevant docs</text>
  <text x="560" y="370" text-anchor="middle" font-size="17" fill="#15803d">via vector search</text>

  <!-- Arrow 2 → 3 -->
  <path d="M720,250 L770,250" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#big-arr)" stroke-linecap="round"/>
  <text x="745" y="235" text-anchor="middle" font-size="13" font-style="italic" fill="#94a3b8">context</text>

  <!-- ══════════════ STEP 3: AUGMENT ══════════════ -->
  <g filter="url(#shadow)">
    <rect x="780" y="60" width="300" height="380" rx="18" fill="#eff6ff" stroke="#2563eb" stroke-width="2.5"/>
  </g>
  <circle cx="930" cy="170" r="60" fill="url(#grad-blue)"/>
  <text x="930" y="190" text-anchor="middle" font-size="52" font-weight="800" fill="#fff">3</text>
  <text x="930" y="295" text-anchor="middle" font-size="30" font-weight="800" fill="#1e40af">Augment</text>
  <text x="930" y="345" text-anchor="middle" font-size="17" fill="#1d4ed8">Combine query with</text>
  <text x="930" y="370" text-anchor="middle" font-size="17" fill="#1d4ed8">retrieved context</text>

  <!-- Arrow 3 → 4 -->
  <path d="M1090,250 L1140,250" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#big-arr)" stroke-linecap="round"/>
  <text x="1115" y="235" text-anchor="middle" font-size="13" font-style="italic" fill="#94a3b8">prompt</text>

  <!-- ══════════════ STEP 4: GENERATE ══════════════ -->
  <g filter="url(#shadow)">
    <rect x="1150" y="60" width="220" height="380" rx="18" fill="#f0fdfa" stroke="#0d9488" stroke-width="2.5"/>
  </g>
  <circle cx="1260" cy="170" r="60" fill="url(#grad-teal)"/>
  <text x="1260" y="190" text-anchor="middle" font-size="52" font-weight="800" fill="#fff">4</text>
  <text x="1260" y="295" text-anchor="middle" font-size="30" font-weight="800" fill="#134e4a">Generate</text>
  <text x="1260" y="345" text-anchor="middle" font-size="16" fill="#0f766e">LLM produces a</text>
  <text x="1260" y="370" text-anchor="middle" font-size="16" fill="#0f766e">grounded answer</text>
</svg>
