<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 720" font-family="Inter, -apple-system, system-ui, sans-serif">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="grad-blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <!-- Big arrow markers -->
    <marker id="big-arr" markerWidth="20" markerHeight="16" refX="19" refY="8" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L20,8 L0,16 Z" fill="#475569"/>
    </marker>
    <marker id="big-arr-start" markerWidth="20" markerHeight="16" refX="1" refY="8" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M20,0 L0,8 L20,16 Z" fill="#475569"/>
    </marker>
    <marker id="big-arr-blue" markerWidth="20" markerHeight="16" refX="19" refY="8" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L20,8 L0,16 Z" fill="#2563eb"/>
    </marker>
    <marker id="big-arr-blue-start" markerWidth="20" markerHeight="16" refX="1" refY="8" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M20,0 L0,8 L20,16 Z" fill="#2563eb"/>
    </marker>
    <marker id="big-arr-green" markerWidth="20" markerHeight="16" refX="19" refY="8" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L20,8 L0,16 Z" fill="#16a34a"/>
    </marker>
    <marker id="big-arr-green-start" markerWidth="20" markerHeight="16" refX="1" refY="8" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M20,0 L0,8 L20,16 Z" fill="#16a34a"/>
    </marker>
  </defs>

  <!-- ══════════════ TEAMS ══════════════ -->
  <g filter="url(#shadow)">
    <rect x="30" y="130" width="200" height="120" rx="14" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2.5"/>
  </g>
  <text x="130" y="170" text-anchor="middle" font-size="20" font-weight="700" fill="#4c1d95">Microsoft Teams</text>
  <text x="130" y="192" text-anchor="middle" font-size="14" fill="#7c3aed">User question</text>
  <rect x="50" y="204" width="160" height="32" rx="6" fill="#fff" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="130" y="224" text-anchor="middle" font-size="12" fill="#475569" font-style="italic">"rewards in feature X?"</text>

  <!-- ══════════════ Teams ↔ Gateway (big arrow) ══════════════ -->
  <path d="M230,190 L300,190" stroke="#475569" stroke-width="4" fill="none" marker-start="url(#big-arr-start)" marker-end="url(#big-arr)" stroke-linecap="round"/>

  <!-- ══════════════ GATEWAY ══════════════ -->
  <g filter="url(#shadow)">
    <rect x="300" y="150" width="120" height="80" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="2.5"/>
  </g>
  <polygon points="360,167 388,182 388,198 360,213 332,198 332,182" fill="none" stroke="#ea580c" stroke-width="2.5"/>
  <text x="360" y="194" text-anchor="middle" font-size="13" font-weight="700" fill="#9a3412">API</text>
  <text x="360" y="250" text-anchor="middle" font-size="16" font-weight="700" fill="#9a3412">Gateway</text>

  <!-- ══════════════ Gateway ↔ Chatbot App (big arrow) ══════════════ -->
  <path d="M420,190 L490,190" stroke="#475569" stroke-width="4" fill="none" marker-start="url(#big-arr-start)" marker-end="url(#big-arr)" stroke-linecap="round"/>

  <!-- ══════════════ CHATBOT APP CONTAINER ══════════════ -->
  <g filter="url(#shadow)">
    <rect x="490" y="80" width="560" height="560" rx="20" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/>
  </g>
  <text x="770" y="118" text-anchor="middle" font-size="24" font-weight="700" fill="#1e3a8a">Chatbot App</text>

  <!-- Step 1 -->
  <g filter="url(#shadow)">
    <rect x="520" y="140" width="500" height="100" rx="12" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
  </g>
  <circle cx="570" cy="190" r="30" fill="url(#grad-blue)"/>
  <text x="570" y="200" text-anchor="middle" font-size="24" font-weight="800" fill="#fff">1</text>
  <text x="620" y="182" font-size="20" font-weight="700" fill="#1e293b">Retrieve wiki context</text>
  <text x="620" y="210" font-size="13" fill="#64748b">Top-K vector search over indexed docs</text>

  <!-- Step 1 → Step 2 -->
  <path d="M770,240 L770,300" stroke="#475569" stroke-width="4" fill="none" marker-end="url(#big-arr)" stroke-linecap="round"/>

  <!-- Step 2 -->
  <g filter="url(#shadow)">
    <rect x="520" y="300" width="500" height="100" rx="12" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
  </g>
  <circle cx="570" cy="350" r="30" fill="url(#grad-blue)"/>
  <text x="570" y="360" text-anchor="middle" font-size="24" font-weight="800" fill="#fff">2</text>
  <text x="620" y="342" font-size="20" font-weight="700" fill="#1e293b">Build augmented prompt</text>
  <text x="620" y="370" font-size="13" fill="#64748b">System + retrieved context + user question</text>

  <!-- Step 2 → Step 3 -->
  <path d="M770,400 L770,460" stroke="#475569" stroke-width="4" fill="none" marker-end="url(#big-arr)" stroke-linecap="round"/>

  <!-- Step 3 -->
  <g filter="url(#shadow)">
    <rect x="520" y="460" width="500" height="100" rx="12" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
  </g>
  <circle cx="570" cy="510" r="30" fill="url(#grad-blue)"/>
  <text x="570" y="520" text-anchor="middle" font-size="24" font-weight="800" fill="#fff">3</text>
  <text x="620" y="502" font-size="20" font-weight="700" fill="#1e293b">Call LLM &amp; respond</text>
  <text x="620" y="530" font-size="13" fill="#64748b">Get answer, return to user — no caching</text>

  <!-- ══════════════ WIKI PAGES (indexing source, top-right) ══════════════ -->
  <g filter="url(#shadow)">
    <rect x="1150" y="20" width="180" height="80" rx="12" fill="#fff" stroke="#334155" stroke-width="2.5"/>
  </g>
  <rect x="1185" y="34" width="110" height="5" rx="1" fill="#e2e8f0"/>
  <rect x="1185" y="44" width="110" height="5" rx="1" fill="#e2e8f0"/>
  <rect x="1185" y="54" width="110" height="5" rx="1" fill="#e2e8f0"/>
  <text x="1240" y="80" text-anchor="middle" font-size="16" font-weight="700" fill="#334155">Wiki pages</text>

  <!-- Wiki pages → Wiki Vec DB (indexing arrow, dashed green) -->
  <path d="M1240,100 L1240,155" stroke="#16a34a" stroke-width="3" stroke-dasharray="7 4" fill="none" marker-end="url(#big-arr-green)" stroke-linecap="round"/>
  <text x="1255" y="135" font-size="12" font-style="italic" fill="#16a34a">indexed</text>

  <!-- ══════════════ WIKI VECTOR DB (visual center at y=190) ══════════════ -->
  <g filter="url(#shadow)">
    <path d="M 1150,155 L 1150,225 A 90,18 0 0 0 1330,225 L 1330,155" fill="#f0fdf4" stroke="#16a34a" stroke-width="2.5"/>
    <ellipse cx="1240" cy="155" rx="90" ry="18" fill="#f0fdf4" stroke="#16a34a" stroke-width="2.5"/>
  </g>
  <text x="1240" y="196" text-anchor="middle" font-size="18" font-weight="700" fill="#14532d">Wiki</text>
  <text x="1240" y="218" text-anchor="middle" font-size="16" font-weight="600" fill="#14532d">Vector DB</text>

  <!-- Step 1 ↔ Wiki Vector DB (straight horizontal, big arrow, to cylinder visual center y=190) -->
  <path d="M1020,190 L1150,190" stroke="#16a34a" stroke-width="4" fill="none" marker-start="url(#big-arr-green-start)" marker-end="url(#big-arr-green)" stroke-linecap="round"/>

  <!-- ══════════════ LLM (visual center at y=510) ══════════════ -->
  <g filter="url(#shadow)">
    <rect x="1150" y="460" width="180" height="100" rx="14" fill="#f0fdfa" stroke="#0d9488" stroke-width="2.5"/>
  </g>
  <text x="1240" y="500" text-anchor="middle" font-size="22" font-weight="700" fill="#134e4a">LLM</text>
  <text x="1240" y="528" text-anchor="middle" font-size="14" fill="#0f766e">Chat GPT</text>
  <text x="1240" y="546" text-anchor="middle" font-size="11" fill="#94a3b8">external API</text>

  <!-- Step 3 ↔ LLM (straight horizontal, big arrow) -->
  <path d="M1020,510 L1150,510" stroke="#2563eb" stroke-width="4" fill="none" marker-start="url(#big-arr-blue-start)" marker-end="url(#big-arr-blue)" stroke-linecap="round"/>
</svg>
